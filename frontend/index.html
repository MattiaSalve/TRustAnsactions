<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Finance Dashboard</title>
    
		<link href="/output.css" rel="stylesheet"> 
    <link href="/input.css" rel="stylesheet"> 
    
		<script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="/file_uploader.js" defer></script>
    <script src="/dashboard.js" defer></script>
</head>


<body class="bg-slate-100 w-full min-h-screen p-6 md:p-12 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-lg font-semibold text-slate-700 mb-4 border-slate-200"> Financial Analytics </h1>
            <p class="text-sm text-slate-700/70">Real-time data from your parsed CSV statements</p>
        </header>

			
				<!-- Date selector -->
				<div class="flex border border-slate-200 gap-4 items-end bg-slate-50 p-4 mb-4 rounded-xl shadow-sm text-slate-700/90">
						<input type="date" id="startDate" class="border rounded p-2 text-sm">
						<input type="date" id="endDate" class="border rounded p-2 text-sm">
						
						<button onclick="fetchDashboardData('transactions')" class="bg-slate-700 text-slate-50 px-4 py-2 rounded text-sm font-medium">
								View Transactions
						</button>
						
						<!-- <button onclick="fetchDashboardData('summary/categories')" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium"> -->
						<!-- 		View Categories -->
						<!-- </button> -->
				</div>

				<!-- Charts -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">

            <div class="p-6 rounded-2xl bg-slate-50 shadow-sm border border-slate-200 col-span-2">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">Transaction Timeline</h2>
                <div class="relative w-full">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-2xl shadow-sm border border-slate-200 col-span-2 row-span-3">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">Spending by Category</h2>
                <div class="relative w-full">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-2xl shadow-sm border border-slate-200 col-span-2 row-span-2">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">Spending by Category</h2>
                <div class="relative w-full">
                    <canvas id="savingsChart"></canvas>
                </div>
            </div>

        </div>



				<div id="dropzone" class="border-2 border-dashed border-slate-200 hover:border-indigo-400 bg-slate-50 rounded-2xl p-6 text-center cursor-pointer transition-colors mt-6">
    <p class="text-sm font-medium text-slate-600">
        ➔ Drag & Drop your fresh ZKB CSV file here, or <span class="text-indigo-600 underline">click to browse</span>
    </p>
    <input type="file" id="fileInput" accept=".csv" class="hidden">
</div>
    </div>

</body>
</html>
